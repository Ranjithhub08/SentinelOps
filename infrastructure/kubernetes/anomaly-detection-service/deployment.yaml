apiVersion: apps/v1
kind: Deployment
metadata:
  name: anomaly-detection-service
  labels:
    app: anomaly-detection-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: anomaly-detection-service
  template:
    metadata:
      labels:
        app: anomaly-detection-service
    spec:
      containers:
      - name: anomaly-detection-service
        image: sentinelops/anomaly-detection-service:latest
        ports:
        - containerPort: 8003
        env:
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: "kafka-service:9092"
