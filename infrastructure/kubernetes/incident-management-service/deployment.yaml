apiVersion: apps/v1
kind: Deployment
metadata:
  name: incident-management-service
  labels:
    app: incident-management-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: incident-management-service
  template:
    metadata:
      labels:
        app: incident-management-service
    spec:
      containers:
      - name: incident-management-service
        image: sentinelops/incident-management-service:latest
        ports:
        - containerPort: 8004
        env:
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: "kafka-service:9092"
